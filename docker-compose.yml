version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: resume_builder_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: resume_builder

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resume_builder_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      JWT_SECRET: change-this-in-production-please
      PORT: "8080"
      GIN_MODE: release
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: resume_builder_web
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://localhost:8080/api
    depends_on:
      - backend

volumes:
  mongo_data:
